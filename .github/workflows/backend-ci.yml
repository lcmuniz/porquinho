name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'porquinho-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'porquinho-backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: porquinho-backend

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: porquinho_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Run all tests
        run: |
          ./mvnw test
        env:
          SPRING_PROFILES_ACTIVE: test
          SUPABASE_DB_URL: jdbc:postgresql://localhost:5432/porquinho_test
          SUPABASE_DB_USERNAME: postgres
          SUPABASE_DB_PASSWORD: postgres
          SUPABASE_JWT_SECRET: test-secret-key-for-ci-must-be-at-least-256-bits-long
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: porquinho-backend/target/surefire-reports/
          retention-days: 7

  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build package
        run: ./mvnw clean package -DskipTests

      - name: Check build artifacts
        run: |
          echo "Build artifacts:"
          ls -lh target/*.jar
          echo "JAR size:"
          du -sh target/porquinho-backend-*.jar

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: porquinho-backend/target/porquinho-backend-*.jar
          retention-days: 7
